name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate-cases:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package for validation commands
        run: pip install -e .

      - name: Validate structured agent cases
        run: python -m zhou.testcases ./test/agent_cases

      - name: Show tracked case categories
        run: |
          python -m zhou.testcases ./test/agent_cases --category smoke
          python -m zhou.testcases ./test/agent_cases --category tools
          python -m zhou.testcases ./test/agent_cases --category memory
          python -m zhou.testcases ./test/agent_cases --category answer

  integration-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package and pytest
        run: |
          pip install -e .
          pip install pytest

      - name: Run mock/stub flow integration tests
        run: pytest tests/integration -q

  compile-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check project sources
        run: python -m compileall src tests

  # Real-run regression and quality evaluation stay separated from
  # this CI gate for now, because they depend on local infra,
  # external services, and later effect-evaluation strategy.
